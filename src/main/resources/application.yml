spring:
  application:
    name: laneflow-engine
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      auto-index-creation: true
  datasource:
    url: ${PG_URI}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

camunda:
  bpm:
    database:
      schema-update: true
    admin-user:
      id: ${CAMUNDA_ADMIN_USER}
      password: ${CAMUNDA_ADMIN_PASSWORD}
      first-name: Admin
    history-level: audit
    default-serialization-format: application/json

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  mail:
    from: ${MAIL_FROM}
    reset-password-url: ${FRONTEND_URL}/reset-password
  reset-token:
    expiration-minutes: 60

springdoc:
  swagger-ui:
    path: /docs
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /api-docs

logging:
  level:
    com.laneflow: DEBUG
    org.camunda: WARN
